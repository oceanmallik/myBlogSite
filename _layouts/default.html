<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
    <meta name="author" content="{{ site.author }}">
    <meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
    <meta property="og:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    <meta property="og:type" content="{% if page.date %}article{% else %}website{% endif %}">
    <link rel="canonical" href="{{ site.url }}{{ page.url }}">
    <link rel="icon" type="image/png" href="{{ '/favicon.png' | relative_url }}">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <script>
        (function () {
            var storedTheme = localStorage.getItem("theme");
            var startTheme;

            if (storedTheme === "dark" || storedTheme === "light" || storedTheme === "sepia" || storedTheme === "cyberpunk") {
                startTheme = storedTheme;
            } else {
                startTheme = "sepia";
            }

            document.documentElement.setAttribute("data-theme", startTheme);
        })();
    </script>
</head>
<body>
    <header>
        <div class="header-row">
            <h1><a class="site-brand" href="{{ '/' | relative_url }}">{% if site.title contains ' Talks' %}<span class="brand-main">{{ site.title | replace: ' Talks', '' }}</span><span class="brand-talks">Talks</span>{% else %}{{ site.title }}{% endif %}</a></h1>
            <nav>
                <a href="{{ '/' | relative_url }}">Home</a>
                <a href="{{ '/archive/' | relative_url }}">Archive</a>
                <a href="{{ '/about/' | relative_url }}">About</a>
            </nav>
        </div>
        <div class="header-controls">
            <a class="nav-support" href="{{ '/support/' | relative_url }}">Support Me</a>
            <div class="theme-control-group">
                <button id="theme-toggle" type="button" aria-label="Cycle through color themes">
                    <span id="theme-icon" aria-hidden="true">📜</span>
                    <span id="theme-name">Sepia</span>
                </button>
                <label class="theme-select-wrap" for="theme-select">
                <span class="sr-only">Choose theme</span>
                <select id="theme-select" aria-label="Choose theme">
                    <option value="sepia">Sepia</option>
                    <option value="cyberpunk">Cyberpunk</option>
                    <option value="light">White</option>
                    <option value="dark">Black</option>
                </select>
                </label>
            </div>
        </div>
    </header>

    <main>
        {{ content }} 
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; {{ 'now' | date: '%Y' }} {{ site.author }}. Built with curiosity and too much caffeine.</p>
            <div class="footer-links">
                <a href="{{ '/archive/' | relative_url }}">Archive</a>
            </div>
        </div>
    </footer>

    <script>
        (function () {
            var themes = ["sepia", "cyberpunk", "light", "dark"];
            var labels = { dark: "Black", light: "White", sepia: "Sepia", cyberpunk: "Cyberpunk" };
            var icons = { dark: "🌙", light: "☀️", sepia: "📜", cyberpunk: "⚡" };
            var button = document.getElementById("theme-toggle");
            var icon = document.getElementById("theme-icon");
            var name = document.getElementById("theme-name");
            var select = document.getElementById("theme-select");
            if (!button) {
                return;
            }
            var currentTheme = document.documentElement.getAttribute("data-theme") || "sepia";

            function applyTheme(theme) {
                document.documentElement.setAttribute("data-theme", theme);
                localStorage.setItem("theme", theme);
                button.setAttribute("aria-label", "Theme: " + labels[theme]);
                button.title = "Theme: " + labels[theme];
                if (icon) {
                    icon.textContent = icons[theme] || "🎨";
                }
                if (name) {
                    name.textContent = labels[theme] || "Theme";
                }
                if (select) {
                    select.value = theme;
                }

                if (theme === "sepia") {
                    document.body.classList.remove("theme-fade-sepia");
                    void document.body.offsetWidth;
                    document.body.classList.add("theme-fade-sepia");
                } else {
                    document.body.classList.remove("theme-fade-sepia");
                }
            }

            applyTheme(currentTheme);

            button.addEventListener("click", function () {
                var index = themes.indexOf(currentTheme);
                currentTheme = themes[(index + 1) % themes.length];
                applyTheme(currentTheme);
            });

            if (select) {
                select.addEventListener("change", function (event) {
                    currentTheme = event.target.value;
                    applyTheme(currentTheme);
                });
            }
        })();
    </script>
</body>
</html>
