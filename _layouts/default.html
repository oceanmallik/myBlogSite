<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
    <meta name="author" content="{{ site.author }}">
    <meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
    <meta property="og:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    <meta property="og:type" content="{% if page.date %}article{% else %}website{% endif %}">
    <link rel="canonical" href="{{ site.url }}{{ page.url }}">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <script>
        (function () {
            var storedTheme = localStorage.getItem("theme");
            var startTheme;

            if (storedTheme === "dark" || storedTheme === "light" || storedTheme === "sepia" || storedTheme === "lagoon") {
                startTheme = storedTheme;
            } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) {
                startTheme = "light";
            } else {
                startTheme = "dark";
            }

            document.documentElement.setAttribute("data-theme", startTheme);
        })();
    </script>
</head>
<body>
    <header>
        <div class="header-row">
            <h1><a href="{{ '/' | relative_url }}">{% if site.title contains ' Talks' %}{{ site.title | replace: ' Talks', '' }} <span class="brand-talks">Talks</span>{% else %}{{ site.title }}{% endif %}</a></h1>
            <button id="theme-toggle" type="button" aria-label="Cycle through color themes">Theme: Dark</button>
        </div>
        <nav>
            <a href="{{ '/' | relative_url }}">Home</a>
            <a href="{{ '/archive/' | relative_url }}">Archive</a>
            <a href="{{ '/about/' | relative_url }}">About</a>
        </nav>
    </header>

    <main>
        {{ content }} 
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; {{ 'now' | date: '%Y' }} {{ site.author }}. All rights reserved.</p>
            <div class="footer-links">
                <a href="{{ '/sitemap.xml' | relative_url }}">Sitemap</a>
                <a href="{{ '/archive/' | relative_url }}">Archive</a>
            </div>
        </div>
    </footer>

    <script>
        (function () {
            var themes = ["dark", "light", "sepia", "lagoon"];
            var labels = { dark: "Dark", light: "Light", sepia: "Sepia", lagoon: "Ember" };
            var button = document.getElementById("theme-toggle");
            if (!button) {
                return;
            }
            var currentTheme = document.documentElement.getAttribute("data-theme") || "dark";

            function applyTheme(theme) {
                document.documentElement.setAttribute("data-theme", theme);
                localStorage.setItem("theme", theme);
                button.textContent = "Theme: " + labels[theme];
            }

            applyTheme(currentTheme);

            button.addEventListener("click", function () {
                var index = themes.indexOf(currentTheme);
                currentTheme = themes[(index + 1) % themes.length];
                applyTheme(currentTheme);
            });
        })();
    </script>
</body>
</html>
