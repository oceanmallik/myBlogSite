---
layout: default
---
<article class="post">
    <header class="post-header">
        <h1>{{ page.title }}</h1>
        <div class="post-meta">
            <span class="date">{{ page.date | date: "%B %d, %Y" }}</span>
            <span class="reading-time" id="reading-time"></span>
            {% if page.author %}
                <span class="author">by {{ page.author }}</span>
            {% else %}
                <span class="author">by {{ site.author }}</span>
            {% endif %}
        </div>
    </header>

    {% if page.tags %}
    <div class="post-tags">
        {% for tag in page.tags %}
            <a href="{{ '/archive/' | relative_url }}" class="tag">#{{ tag }}</a>
        {% endfor %}
    </div>
    {% endif %}

    <div class="blog-content">
        {{ content }}
    </div>

    <nav class="post-nav">
        <a href="{{ '/' | relative_url }}">&larr; Back to all posts</a>
    </nav>
</article>

<script>
    (function () {
        var content = document.querySelector('.blog-content');
        if (content) {
            var text = content.innerText;
            var wordCount = text.trim().split(/\s+/).length;
            var readingTime = Math.ceil(wordCount / 200);
            var readingTimeEl = document.getElementById('reading-time');
            if (readingTimeEl) {
                readingTimeEl.textContent = readingTime + ' min read';
            }
        }
    })();
</script>
